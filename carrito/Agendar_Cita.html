<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="../estilos-css/Agendar_cita.css">
</head>
<body>

    <div class="container-form">

        <!-- ============================================ -->
        <!-- FLECHA VOLVER AL MENÚ -->
        <!-- ============================================ -->
        <div class="volver-container">
            <a href="../inicio/index.html" class="btn-volver">
                <i class="bi bi-arrow-left-circle"></i> Volver al Menú
            </a>
        </div>

        <h2>Agendar Cita</h2>

        <div class="row">
            <div class="col-md-6">
                <!-- ============================================ -->
                <!-- NOMBRE - Solo letras -->
                <!-- ============================================ -->
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" class="form-control" maxlength="15" placeholder="Ingrese su nombre">
                <div id="error-nombre" class="mensaje-error"></div>
                <div id="exito-nombre" class="mensaje-exito">✓ Válido</div>
            </div>

            <div class="col-md-6">
                <!-- ============================================ -->
                <!-- APELLIDO - Solo letras -->
                <!-- ============================================ -->
                <label for="apellido">Apellido *</label>
                <input type="text" id="apellido" class="form-control" maxlength="15" placeholder="Ingrese su apellido">
                <div id="error-apellido" class="mensaje-error"></div>
                <div id="exito-apellido" class="mensaje-exito">✓ Válido</div>
            </div>
        </div>

        <!-- ============================================ -->
        <!-- CORREO - @ y .com -->
        <!-- ============================================ -->
        <label for="correo">Correo electrónico *</label>
        <input type="email" id="correo" class="form-control" placeholder="correo@ejemplo.com">
        <div id="error-correo" class="mensaje-error"></div>
        <div id="exito-correo" class="mensaje-exito">✓ Válido</div>

        <!-- ============================================ -->
        <!-- TELÉFONO - Solo números 7-10 dígitos -->
        <!-- ============================================ -->
        <label for="telefono">Teléfono *</label>
        <input type="text" id="telefono" class="form-control" placeholder="Ingrese su teléfono" maxlength="10">
        <div id="error-telefono" class="mensaje-error"></div>
        <div id="exito-telefono" class="mensaje-exito">✓ Válido</div>

        <!-- ============================================ -->
        <!-- DIRECCIÓN -->
        <!-- ============================================ -->
        <label for="direccion">Dirección *</label>
        <input type="text" id="direccion" class="form-control" placeholder="Ingrese su dirección">
        <div id="error-direccion" class="mensaje-error"></div>
        <div id="exito-direccion" class="mensaje-exito">✓ Válido</div>

        <!-- ============================================ -->
        <!-- CIUDAD - Solo letras -->
        <!-- ============================================ -->
        <label for="ciudad">Ciudad *</label>
        <input type="text" id="ciudad" class="form-control" placeholder="Ingrese su ciudad">
        <div id="error-ciudad" class="mensaje-error"></div>
        <div id="exito-ciudad" class="mensaje-exito">✓ Válido</div>

        <hr>

        <!-- ============================================ -->
        <!-- SERVICIO -->
        <!-- ============================================ -->
        <label for="servicio">Nombre del servicio *</label>
        <input type="text" id="servicio" class="form-control" placeholder="Ej: Limpieza General">
        <input type="hidden" id="servicioOculto">
        <div id="error-servicio" class="mensaje-error"></div>
        <div id="exito-servicio" class="mensaje-exito">✓ Válido</div>

        <hr>

        <!-- ============================================ -->
        <!-- TIPO -->
        <!-- ============================================ -->
        <label>Tipo de servicio *</label>
        <div class="d-flex gap-3">
            <div class="form-check">
                <input class="form-check-input" type="radio" id="hogar" name="tipo" value="Hogar">
                <label class="form-check-label" for="hogar">Hogar</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" id="oficina" name="tipo" value="Oficina">
                <label class="form-check-label" for="oficina">Oficina</label>
            </div>
        </div>
        <div id="error-tipo" class="mensaje-error"></div>
        <div id="exito-tipo" class="mensaje-exito">✓ Válido</div>

        <hr>

        <!-- ============================================ -->
        <!-- JORNADA -->
        <!-- ============================================ -->
        <label>Jornada *</label>
        <div class="d-flex gap-3">
            <div class="form-check">
                <input class="form-check-input" type="radio" id="am" name="jornada" value="AM">
                <label class="form-check-label" for="am">AM</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" id="pm" name="jornada" value="PM">
                <label class="form-check-label" for="pm">PM</label>
            </div>
        </div>
        <div id="error-jornada" class="mensaje-error"></div>
        <div id="exito-jornada" class="mensaje-exito">✓ Válido</div>

        <!-- ============================================ -->
        <!-- FECHA -->
        <!-- ============================================ -->
        <label class="mt-3" for="fecha">Fecha *</label>
        <input type="date" id="fecha" class="form-control calendar-box">
        <div id="error-fecha" class="mensaje-error"></div>
        <div id="exito-fecha" class="mensaje-exito">✓ Válido</div>

        <!-- ============================================ -->
        <!-- HORA - Filtrada por jornada -->
        <!-- ============================================ -->
        <label for="hora">Hora *</label>
        <select id="hora" class="form-control">
            <option value="">Seleccionar hora</option>
        </select>
        <div id="error-hora" class="mensaje-error"></div>
        <div id="exito-hora" class="mensaje-exito">✓ Válido</div>

        <!-- ============================================ -->
        <!-- PROFESIONAL -->
        <!-- ============================================ -->
        <label for="profesional">Profesional *</label>
        <select id="profesional" class="form-control">
            <option value="">Seleccionar profesional</option>
        </select>
        <div id="error-profesional" class="mensaje-error"></div>
        <div id="exito-profesional" class="mensaje-exito">✓ Válido</div>

        <br>
        <button id="btnConfirmar" class="btn btn-primary w-100">Confirmar cita</button>

    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/Agendar_Cita.js"></script>

</body>
</html>
