<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrito de productos</title>


    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap"
        rel="stylesheet">


    <!-- CSS propio -->
    <link rel="stylesheet" href="../estilos-css/carrito.css">


    <link rel="icon" href="../assets/img/logo.png">


</head>


<body>


<main class="contenedor">


    <!-- VOLVER -->

    <div class="volver-container">

        <a href="../inicio/index.html" class="btn-volver">

            <i class="bi bi-arrow-left-circle"></i>
            Volver al menú

        </a>

    </div>




    <!-- ENCABEZADO -->

    <section class="encabezado">


        <div class="titulo">

            <div>

                <h1>
                    🛒 Carrito de productos
                </h1>


                <p>
                    Revisa los productos seleccionados antes de confirmar tu solicitud.
                </p>


            </div>


        </div>



        <div class="contador">


            <i class="bi bi-cart-fill"></i>


            <span id="cantidadServicios">
                0
            </span>


            productos


        </div>


    </section>




    <a href="../carrito/Citas_agendadas.html" class="boton-volver">

        <i class="bi bi-arrow-left"></i>
        Otras Citas
        

    </a>





    <!-- CONTENIDO PRINCIPAL -->


    <div class="pantalla-carrito">



        <!-- PRODUCTOS -->

        <section class="columna-servicios">


            <div id="contenedorCarrito">


                <!-- JavaScript cargará aquí los productos -->


                <div class="mensaje-vacio">


                    <i class="bi bi-cart-x"></i>


                    <h3>
                        Tu carrito está vacío
                    </h3>


                    <p>
                        Selecciona productos desde el catálogo para agregarlos.
                    </p>


                </div>


            </div>


        </section>





        <!-- RESUMEN -->

        <aside class="columna-resumen">


            <div class="tarjeta tarjeta-resumen">


                <h3 class="titulo-resumen">

                    Resumen del pedido

                </h3>



                <div class="fila-resumen">


                    <span>
                        Subtotal
                    </span>


                    <strong id="subtotal" class="texto-rosa">

                        $0

                    </strong>


                </div>





                <div class="fila-resumen">


                    <span class="con-icono">

                    Valor IVA 


                        <i class="bi bi-info-circle icono-info"
                            title="Costo de gestión">
                        </i>


                    </span>



                    <strong id="tarifa" class="texto-rosa">

                        $0

                    </strong>



                </div>






                <hr class="separador">





                <div class="fila-resumen total">


                    <span class="texto-total">

                        Total

                    </span>



                    <h3 id="total" class="texto-rosa">

                        $0

                    </h3>



                </div>


                <a href="#" class="boton-solicitar" id="btnPagarProductos">
                    <i class="bi bi-journal-text"></i>
                    Pagar productos
                </a>




            </div>



        </aside>




    </div>



</main>




<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- JAVASCRIPT -->
<script src="../js/cargarNavbar.js"></script>
<script src="../js/carrito.js"></script>
<script src="../js/footer.js"></script>



</body>

</html>
