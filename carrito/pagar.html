<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finalizar compra</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../estilos-css/pagar.css">

</head>

<body>

<main class="contenedor-pago">

<h1>
<i class="bi bi-credit-card"></i>
Finalizar compra
</h1>


<section class="zona-pago">


<div class="resumen-compra">

<h2>
<i class="bi bi-cart-check"></i>
Resumen del pedido
</h2>


<div id="productosPago"></div>


<div class="totales">

<p>
Subtotal:
<span id="subtotalPago">$0</span>
</p>


<p>
IVA:
<span id="ivaPago">$0</span>
</p>


<h3>
Total:
<span id="totalPago">$0</span>
</h3>


</div>

</div>



<div class="formulario-pago">


<h2>
<i class="bi bi-person"></i>
Datos de pago
</h2>


<label>
Nombre completo
</label>


<input 
type="text"
id="nombre"
placeholder="Ingrese su nombre completo"
maxlength="100">


<small id="errorNombre"></small>



<label>
Correo electrónico
</label>


<input
type="email"
id="correo"
placeholder="ejemplo@gmail.com">


<small id="errorCorreo"></small>



<label>
Método de pago
</label>


<select id="metodoPago">


<option value="">
Seleccione método
</option>


<option value="Bancolombia">
Bancolombia
</option>


<option value="Nequi">
Nequi
</option>


<option value="Daviplata">
Daviplata
</option>


<option value="Efecty">
Efecty
</option>


<option value="Otros">
Otros bancos
</option>


</select>


<small id="errorMetodo"></small>



<button id="btnPagar">

<i class="bi bi-check-circle"></i>

Continuar pago

</button>


</div>


</section>

</main>




<!-- MODAL DATOS BANCARIOS -->

<div id="modalBanco" class="modal-pago">


<div class="ventana-pago">


<button 
id="cerrarBanco"
class="cerrar-modal">

✖

</button>



<h2>

<i class="bi bi-bank"></i>

Datos bancarios

</h2>



<div id="zonaBanco">


<label>
Banco
</label>


<input 
type="text"
id="banco"
readonly>



<small id="errorBanco"></small>




<label>
Tipo de cuenta
</label>


<select id="tipoCuenta">


<option value="">
Seleccione
</option>


<option value="Ahorros">
Ahorros
</option>


<option value="Corriente">
Corriente
</option>


</select>



<small id="errorCuenta"></small>




<label>
Número de cuenta
</label>


<input
type="text"
id="numeroCuenta"
placeholder="Número de cuenta">


<small id="errorNumero"></small>


</div>





<div id="zonaEfecty">


<h3>
Pago por Efecty
</h3>


<p>
Se generará un código para realizar el pago en un punto autorizado.
</p>


</div>



<button id="confirmarBanco">


<i class="bi bi-credit-card"></i>


Realizar pago


</button>


</div>


</div>



<!-- MODAL FINAL -->

<div id="modalFinal" class="modal-pago">


<div class="ventana-pago">


<h2>

<i class="bi bi-check-circle"></i>

Pago realizado

</h2>



<p>
Su compra fue procesada correctamente.
</p>



<button id="finalizarCompra">

Aceptar

</button>



</div>


</div>



  <!-- ================= FOOTER ================= -->
  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/cargarNavbar.js"></script>

<script src="../js/pagar.js"></script>


</body>

</html>
