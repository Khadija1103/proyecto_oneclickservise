<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Servicios</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../estilos-css/catalogo.css">

    <link rel="icon" href="../assets/img/logo.png">
</head>

<body>

    <!-- Navbar -->
    <script src="../js/navbar.js"></script>

    <main class="services-container">

        <!-- Botón volver -->
        <div class="volver-container">
            <a href="../inicio/index.html" class="btn-volver">
                <i class="bi bi-arrow-left-circle"></i>
                Volver al Menú
            </a>
        </div>

        <!-- Encabezado -->
        <header class="page-header">

            <div class="header-left">
                <h1>🌟 Catálogo de Servicios</h1>
                <p>Encuentra el servicio que necesitas y solicítalo fácilmente.</p>
            </div>

            <div class="badge-contador">
                <i class="bi bi-grid"></i>
                <span id="totalCount">0</span> servicios
            </div>

        </header>

        <!-- Buscador -->
        <section class="toolbar">

            <div class="search-box">
                <i class="bi bi-search"></i>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Buscar servicios...">
            </div>

        </section>

        <!-- Cantidad -->
        <div class="results-count">
            Mostrando
            <span id="visibleCount">0</span>
            servicios
        </div>

        <!-- Catálogo -->
        <section id="servicesGrid" class="services-grid">
            <!-- Aquí JavaScript agrega las tarjetas -->
        </section>

    </main>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Catálogo -->
    <script src="../js/catalogo.js"></script>

    <!-- Footer -->
    <script src="../js/footer.js"></script>

</body>

</html>
