<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Productos</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../estilos-css/catalogo.css">

    <link rel="icon" href="../assets/img/logo.png">

</head>

<body>

    <!-- Navbar -->
    <script src="../js/navbar.js"></script>

    <main class="services-container">

        <!-- ============================================ -->
        <!-- BOTÓN VOLVER -->
        <!-- ============================================ -->

        <div class="volver-container">

            <a href="../inicio/index.html" class="btn-volver">

                <i class="bi bi-arrow-left-circle"></i>

                Volver al Menú

            </a>

        </div>

        <!-- ============================================ -->
        <!-- ENCABEZADO -->
        <!-- ============================================ -->

        <header class="page-header">

            <div class="header-left">

                <h1>🛍️ Catálogo de Productos</h1>

                <p>

                    Explora nuestro catálogo de productos.

                    Agrega los productos que necesites al carrito y realiza tu compra de forma rápida y segura.

                </p>

            </div>

            <div class="badge-contador">

                <i class="bi bi-box-seam"></i>

                <span id="totalCount">0</span> productos

            </div>

        </header>

        <!-- ============================================ -->
        <!-- BUSCADOR -->
        <!-- ============================================ -->

        <section class="toolbar">

            <div class="search-box">

                <i class="bi bi-search"></i>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Buscar productos...">

            </div>

        </section>

        <!-- ============================================ -->
        <!-- CONTADOR -->
        <!-- ============================================ -->

        <div class="results-count">

            Mostrando

            <span id="visibleCount">0</span>

            productos

        </div>

        <!-- ============================================ -->
        <!-- CATÁLOGO -->
        <!-- ============================================ -->

        <section
            id="servicesGrid"
            class="services-grid">

            <!-- productos.js insertará aquí las tarjetas -->

        </section>

    </main>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript Productos -->
    <script src="../js/productos.js"></script>

    <!-- Footer -->
    <script src="../js/footer.js"></script>

</body>

</html>
