<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="../estilos-css/login.css">
</head>
<body>

    <div class="login-card">

        <!-- ============================================ -->
        <!-- FLECHA VOLVER AL MENÚ -->
        <!-- ============================================ -->
        <div class="volver-container">
            <a href="../inicio/index.html" class="btn-volver">
                <i class="bi bi-arrow-left-circle"></i> Volver al Menú
            </a>
        </div>

        <div class="logo-login">
            <img src="../assets/img/logo.png" alt="Logo">
        </div>

        <h2>Iniciar Sesión</h2>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label fw-bold">Correo electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required>
                <div id="error-email" class="mensaje-error"></div>
                <div id="exito-email" class="mensaje-exito">✓ Válido</div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña" required>
                <div id="error-password" class="mensaje-error"></div>
                <div id="exito-password" class="mensaje-exito">✓ Válido</div>
            </div>

            <div class="forgot-password">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="button" id="btnIniciarSesion" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>

        <div class="divider">
            <span class="line"></span>
            <span class="text">O Continúa con</span>
            <span class="line"></span>
        </div>

        <div class="social-buttons">
            <button class="btn-social google" onclick="alert('Google')">
                <i class="bi bi-google"></i> Continúa con Google
            </button>
            <button class="btn-social facebook" onclick="alert('Facebook')">
                <i class="bi bi-facebook"></i> Continúa con Facebook
            </button>
        </div>

        <div class="registro-link">
            ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
